name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]

jobs:
  # ── lint ───────────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --extra dev --extra ui --extra openai --extra anthropic

      - name: ruff check
        run: uv run ruff check humanize_zh/ tests/

      - name: mypy
        run: uv run mypy humanize_zh/

  # ── test matrix ────────────────────────────────────────────────────────
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra ui --extra openai --extra anthropic

      - name: pytest
        run: uv run pytest --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ── build + wheel smoke test ────────────────────────────────────────────
  build:
    name: build wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build sdist + wheel
        run: uv build

      - name: Verify wheel installs cleanly
        run: |
          uv venv check-install
          uv pip install --python check-install/bin/python dist/*.whl
          check-install/bin/python -c "import humanize_zh; print(humanize_zh.__version__)"
          check-install/bin/python -m humanize_zh.cli --version

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ── TestPyPI dry-run ────────────────────────────────────────────────────
  # Runs only on a version tag push (vX.Y.Z).
  # Requires a repo secret: TESTPYPI_API_TOKEN
  publish-testpypi:
    name: publish → TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: testpypi
      url: https://test.pypi.org/project/humanize-zh/
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build
        run: uv build

      - name: Publish to TestPyPI
        run: uv publish --index testpypi
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TESTPYPI_API_TOKEN }}
